<!doctype html>
<html lang="en">
  <!--Thanks to Gregor Cresnar, kmg design, alkhalifi design, pixel perfect, and Freepick for providing the design assets from flaticon.com -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- External Stylesheet -->
    <link rel="stylesheet" href="styles.css" />
    <style>
      /* Background Image for the Homepage */
      body {
        background-image: url("/images/desktop-background.png");
        background-size: cover;
        background-position: center;
        height: 100vh;
        margin: 0;
        display: flex;
        flex-direction: column;
        justify-content: flex-end; /* Align taskbar to the bottom */
      }
    </style>
  </head>
  <body>
    <!-- Taskbar -->
    <nav
      class="navbar fixed-bottom bg-dark navbar-dark border-top border-secondary p-0 taskbar"
    >
      <div
        class="container-fluid h-100 d-flex justify-content-between align-items-center px-2"
      >
        <!-- Left: Start Menu Image Icon -->
        <div class="d-flex align-items-center h-100">
          <button
            class="btn btn-dark h-100 border-0 rounded-0 px-3 d-flex align-items-center taskbar-btn"
            type="button"
            title="Start"
            id="startMenuBtn"
          >
            <img src="/images/start.png" alt="Start" class="taskbar-icon" />
          </button>
          <!-- Start Menu (opens upward/backwards) -->
          <div
            id="startMenu"
            class="start-menu hidden"
            role="menu"
            aria-hidden="true"
          >
            <div
              class="app-item"
              data-target="fileExplorerBtn"
              role="menuitem"
              tabindex="0"
            >
              <img src="/images/files.png" alt="Files" />
              <span>File Explorer</span>
            </div>
            <div
              class="app-item"
              data-target="browserBtn"
              role="menuitem"
              tabindex="0"
            >
              <img src="/images/browser.png" alt="Browser" />
              <span>Browser</span>
            </div>
            <div
              class="app-item"
              data-target="settingsBtn"
              role="menuitem"
              tabindex="0"
            >
              <img src="/images/settings.png" alt="Settings" />
              <span>Settings</span>
            </div>
          </div>
        </div>

        <!-- Center: App Image Icons (Windows 11 Style) -->
        <div class="d-flex align-items-center h-100 gap-1 mx-auto">
          <!-- Home App -->
          <button
            class="btn btn-secondary h-100 border-0 rounded-0 px-3 d-flex flex-column justify-content-center align-items-center position-relative taskbar-btn active"
            type="button"
            title="Home"
            id="homeBtn"
            onclick="location.href = 'index.html'"
          >
            <img src="/images/home.png" alt="Home" class="taskbar-icon" />
            <span
              class="position-absolute bottom-0 start-50 translate-middle-x bg-info rounded active-indicator"
            ></span>
          </button>

          <!-- App -->
          <button
            class="btn btn-dark h-100 border-0 rounded-0 px-3 d-flex flex-column justify-content-center align-items-center position-relative taskbar-btn"
            type="button"
            title="File Explorer"
            id="fileExplorerBtn"
            onclick="location.href = 'files.html'"
          >
            <img src="/images/files.png" alt="Files" class="taskbar-icon" />
          </button>

          <!-- Pinned App (Inactive) -->
          <button
            class="btn btn-dark h-100 border-0 rounded-0 px-3 d-flex align-items-center taskbar-btn"
            type="button"
            title="Browser"
            id="browserBtn"
            onclick="location.href = 'browser.html'"
          >
            <img src="/images/browser.png" alt="Browser" class="taskbar-icon" />
          </button>

          <!-- Pinned App (Inactive) -->
          <button
            class="btn btn-dark h-100 border-0 rounded-0 px-3 d-flex align-items-center taskbar-btn"
            type="button"
            title="Settings"
            id="settingsBtn"
            onclick="location.href = 'settings.html'"
          >
            <img
              src="/images/settings.png"
              alt="Settings"
              class="taskbar-icon"
            />
          </button>
        </div>

        <!-- Right: System Tray -->
        <div
          class="d-flex align-items-center h-100 gap-3 px-2 text-white-50 system-tray"
        >
          <img src="/images/wifi.png" alt="Wifi" class="tray-icon-wifi" />
          <div
            class="text-end lh-1 d-flex flex-column justify-content-center h-100 tray-clock"
          >
            <span id="time"></span>
            <span class="mt-1" id="date"></span>
          </div>
        </div>
      </div>
    </nav>

    <script src="script.js"></script>
  </body>
</html>
